name: Build for Windows, Linux & macOS

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output_name: snowflake-linux
            extension: ""
          - os: windows-latest
            output_name: snowflake-windows
            extension: ".exe"
          - os: macos-latest
            output_name: snowflake-macos
            extension: ""

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed snowflake.py

    - name: Debug - list dist folder
      run: |
        echo "Contents of dist:"
        ls -la dist/ || dir dist
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: dist/snowflake*

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/snowflake*
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
