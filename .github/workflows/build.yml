name: Build for Windows, Linux & macOS

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false          # let all builds complete
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output_name: snowflake-linux
            windowed_flag: ''
          - os: windows-latest
            output_name: snowflake-windows.exe
            windowed_flag: '--windowed'
          - os: macos-latest
            output_name: snowflake-macos
            windowed_flag: '--windowed'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Linux: install SDL2 libraries needed by Pygame
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

    # Python dependencies
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame
        if [ "${{ runner.os }}" == "Windows" ]; then
          pip install pywin32
        fi
        pip install pyinstaller==6.6.0

    # Build with detailed logging
    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --onefile ${{ matrix.windowed_flag }} --log-level=DEBUG snowflake.py

    # Diagnostic: list the dist folder contents
    - name: List dist directory
      run: |
        echo "Contents of dist/"
        ls -la dist/ || dir dist\
      shell: bash

    # Rename the binary
    - name: Rename binary
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          mv dist/snowflake.exe dist/${{ matrix.output_name }}
        else
          mv dist/snowflake dist/${{ matrix.output_name }}
        fi
      shell: bash

    # Upload the artifact to the release
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.output_name }}
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
