name: Build for Windows, Linux & macOS

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output_name: snowflake-linux
          - os: windows-latest
            output_name: snowflake-windows.exe
          - os: macos-latest
            output_name: snowflake-macos

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame
        pip install pywin32
        pip install pyinstaller==6.6.0

    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed --debug snowflake.py
  
    - name: Rename binary
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          mv dist/snowflake.exe dist/${{ matrix.output_name }}
        else
          mv dist/snowflake dist/${{ matrix.output_name }}
        fi
      shell: bash

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.output_name }}
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
